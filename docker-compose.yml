services:
  # Ollama Local LLM & Embedding Service
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-service
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_NUM_PARALLEL=1
    # Automatically downloads required models on first run
    entrypoint: >
      /bin/sh -c "
      ollama serve &
      sleep 5;
      echo '=== Pulling gemma3:1b ===';
      ollama pull gemma3:1b;
      echo '=== Bootstrapping completed, keeping ollama running ===';
      wait
      "
    restart: always

  # Node.js API Service
  backend:
    build:
      context: .      # <-- Tells Compose to build from current folder
      dockerfile: Dockerfile
    container_name: backend-service
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - OLLAMA_HOST=http://ollama:11434
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - YT_V3_API_KEY=${YT_V3_API_KEY}
      - GROK_API_KEY=${GROK_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PROXY_URL=${PROXY_URL}
      - YOUTUBE_COOKIE=${YOUTUBE_COOKIE}
      - YOUTUBE_USER_AGENT=${YOUTUBE_USER_AGENT:-Mozilla/5.0 (Linux; Android 15; Pixel 9) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Mobile Safari/537.36}
    depends_on:
      - ollama
      - redis
    restart: always

  # Redis Database Cache & Message Queue broker
  redis:
    image: redis:7-alpine
    container_name: redis-service
    ports:
      - "6379:6379"
    restart: always

volumes:
  ollama-data:
